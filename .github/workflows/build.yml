name: Build and Release Spotify Downloader

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1
  CONFIGURATION: Release
  PLATFORM: x64

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Create self-signed certificate (optional)
        continue-on-error: true
        shell: pwsh
        run: |
          try {
            $cert = New-SelfSignedCertificate -Type Custom `
              -Subject "CN=SpotifyDownloader" `
              -KeyUsage DigitalSignature `
              -FriendlyName "SpotifyDownloaderCert" `
              -CertStoreLocation "Cert:\CurrentUser\My" `
              -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3")
            $thumbprint = $cert.Thumbprint
            Write-Host "Certificate created: $thumbprint"
            echo "CERT_THUMBPRINT=$thumbprint" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } catch {
            Write-Warning "Failed to create certificate: $_"
            Write-Warning "Continuing without MSIX signing..."
          }

      - name: Restore NuGet packages (WinUI)
        run: dotnet restore SpotifyDownloader.sln -p:Platform=${{ env.PLATFORM }}

      - name: Restore NuGet packages (Web)
        run: dotnet restore SpotifyDownloader.Web.sln

      - name: Build Core (class library)
        run: dotnet build src/SpotifyDownloader.Core/SpotifyDownloader.Core.csproj -c ${{ env.CONFIGURATION }} -p:Platform=${{ env.PLATFORM }} --no-restore

      - name: Build App (WinUI 3)
        run: dotnet build src/SpotifyDownloader.App/SpotifyDownloader.App.csproj -c ${{ env.CONFIGURATION }} -p:Platform=${{ env.PLATFORM }} --no-restore

      - name: Build Web API
        run: dotnet build src/SpotifyDownloader.Api/SpotifyDownloader.Api.csproj -c ${{ env.CONFIGURATION }}

      - name: Build Web WASM
        run: dotnet build src/SpotifyDownloader.Wasm/SpotifyDownloader.Wasm.csproj -c ${{ env.CONFIGURATION }}

      - name: Prepare Release folder

      - name: Compile Inno Setup installer
        shell: pwsh
        run: |
          $issPath = "${{ github.workspace }}\installer.iss"
          if (Test-Path $issPath) {
            $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
            if (-not (Test-Path $iscc)) {
              $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
            }
            if (-not (Test-Path $iscc)) {
              $iscc = "ISCC.exe"
            }
            Write-Host "Using ISCC: $iscc"
            & $iscc $issPath
            Write-Host "Inno Setup exit code: $LASTEXITCODE"
          } else {
            Write-Warning "installer.iss not found, skipping Inno Setup"
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SpotifyDownloader-x64-${{ env.CONFIGURATION }}
          path: |
            ${{ github.workspace }}\Release\**\*
            ${{ github.workspace }}\Installer\*.exe
          compression-level: 9

      - name: Upload Web WASM (for Vercel)
        uses: actions/upload-artifact@v4
        with:
          name: SpotifyDownloader-WASM
          path: ${{ github.workspace }}\src\SpotifyDownloader.Wasm\bin\Release\net8.0\wwwroot\**\*
          compression-level: 9

      - name: Upload Inno Setup installer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SpotifyDownloader-Setup
          path: ${{ github.workspace }}\Installer\*.exe
          compression-level: 0

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ github.workspace }}\Installer\*.exe
          generate_release_notes: true
