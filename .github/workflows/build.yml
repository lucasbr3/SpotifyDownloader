name: Build and Release Spotify Downloader

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1
  CONFIGURATION: Release
  PLATFORM: x64

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Create self-signed certificate for MSIX signing
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate -Type Custom `
            -Subject "CN=SpotifyDownloader, O=SpotifyDownloader" `
            -KeyUsage DigitalSignature `
            -FriendlyName "SpotifyDownloaderCert" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}Subject Type=End Entity")
          $thumbprint = $cert.Thumbprint
          Write-Host "Certificate thumbprint: $thumbprint"
          echo "CERT_THUMBPRINT=$thumbprint" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore NuGet packages
        run: >
          dotnet restore SpotifyDownloader.sln
          -p:Platform=${{ env.PLATFORM }}

      - name: Build Core (class library)
        run: >
          dotnet build src/SpotifyDownloader.Core/SpotifyDownloader.Core.csproj
          -c ${{ env.CONFIGURATION }}
          -p:Platform=${{ env.PLATFORM }}
          --no-restore
          -warnaserror-

      - name: Build App (WinUI 3)
        run: >
          dotnet build src/SpotifyDownloader.App/SpotifyDownloader.App.csproj
          -c ${{ env.CONFIGURATION }}
          -p:Platform=${{ env.PLATFORM }}
          --no-restore
          -warnaserror-

      - name: Package MSIX (may fail if Windows SDK is incomplete)
        continue-on-error: true
        shell: pwsh
        run: |
          $slnDir = "${{ github.workspace }}"
          $proj = "$slnDir\src\SpotifyDownloader.App\SpotifyDownloader.App.csproj"
          $msbuild = "${env:ProgramFiles}\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\MSBuild.exe"
          if (-not (Test-Path $msbuild)) {
            $msbuild = "${env:ProgramFiles}\Microsoft Visual Studio\2022\Community\MSBuild\Current\Bin\MSBuild.exe"
          }
          if (-not (Test-Path $msbuild)) {
            Write-Warning "MSBuild not found at expected paths, trying msbuild from PATH"
            $msbuild = "msbuild"
          }
          Write-Host "Using MSBuild: $msbuild"
          & $msbuild $proj `
            /t:Build `
            /p:Configuration=${{ env.CONFIGURATION }} `
            /p:Platform=${{ env.PLATFORM }} `
            /p:AppxPackage=true `
            /p:AppxBundle=Never `
            /p:UapAppxPackageBuildMode=CI `
            /p:AppxPackageDir="$slnDir\AppPackages\" `
            /p:PackageCertificateThumbprint=$env:CERT_THUMBPRINT `
            /p:NoWarn=APPX2009 `
            /restore `
            /verbosity:minimal
          Write-Host "MSIX build exit code: $LASTEXITCODE"

      - name: Prepare Release folder
        shell: pwsh
        run: |
          $src = "${{ github.workspace }}\src\SpotifyDownloader.App\bin\${{ env.PLATFORM }}\${{ env.CONFIGURATION }}\net8.0-windows10.0.19041.0"
          $release = "${{ github.workspace }}\Release"
          New-Item -ItemType Directory -Path $release -Force | Out-Null
          if (Test-Path $src) {
            Copy-Item "$src\*" $release -Recurse -Force -ErrorAction SilentlyContinue
            Remove-Item "$release\*.pdb" -Force -ErrorAction SilentlyContinue
            Remove-Item "$release\*.xml" -Force -ErrorAction SilentlyContinue
          } else {
            Write-Warning "Build output not found at: $src"
          }
          Copy-Item "${{ github.workspace }}\Assets\icon.ico" "$release\" -Force -ErrorAction SilentlyContinue
          @"
FFmpeg is required for audio conversion.
Download from: https://ffmpeg.org/download.html
Place ffmpeg.exe in the same folder as SpotifyDownloader.exe or add to PATH.
"@ | Out-File "$release\FFMPEG_README.txt" -Encoding utf8

      - name: Compile Inno Setup installer
        shell: pwsh
        run: |
          $issPath = "${{ github.workspace }}\installer.iss"
          if (Test-Path $issPath) {
            $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
            if (-not (Test-Path $iscc)) {
              $iscc = "ISCC.exe"
            }
            Write-Host "Compiling Inno Setup script..."
            & $iscc $issPath
            Write-Host "Inno Setup exit code: $LASTEXITCODE"
          } else {
            Write-Warning "installer.iss not found, skipping Inno Setup"
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SpotifyDownloader-x64-${{ env.CONFIGURATION }}
          path: |
            ${{ github.workspace }}\Release\**\*
            ${{ github.workspace }}\Installer\*.exe
            ${{ github.workspace }}\AppPackages\**\*.msix
            ${{ github.workspace }}\AppPackages\**\*.msixupload
            ${{ github.workspace }}\src\SpotifyDownloader.App\bin\${{ env.PLATFORM }}\${{ env.CONFIGURATION }}\AppPackages\**\*
          compression-level: 9

      - name: Upload MSIX package separately
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SpotifyDownloader-MSIX
          path: |
            ${{ github.workspace }}\AppPackages\**\*.msix
            ${{ github.workspace }}\src\SpotifyDownloader.App\bin\${{ env.PLATFORM }}\${{ env.CONFIGURATION }}\AppPackages\**\*.msix
          compression-level: 0

      - name: Upload Inno Setup installer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SpotifyDownloader-Setup
          path: ${{ github.workspace }}\Installer\*.exe
          compression-level: 0

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ github.workspace }}\Installer\*.exe
            ${{ github.workspace }}\AppPackages\**\*.msix
          generate_release_notes: true
